name: CDN-pilot — deploy til dev

# Manuelt trigget — kjøres kun når teamet eksplisitt vil teste CDN-varianten.
# Deployer k9-sak-web-cdn parallelt med eksisterende k9-sak-web i dev-fss.
# 🔴 TODO: Verifiser CDN upload-action mot https://docs.nais.io/services/cdn/
on:
  push:
      branches: [cdn]

jobs:
  build-and-deploy-cdn-dev:
    name: Bygg CDN-variant og deploy til dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: read
    env:
      CLUSTER: dev-fss
      CDN_BASE_URL: "https://cdn.nav.no/k9saksbehandling/k9-sak-web/"
    environment: dev-fss:k9saksbehandling
    steps:
      - name: Hente kode
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Setup + Install
        uses: ./.github/actions/setup-install
        with:
          npmAuthToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Bygge dist med CDN base-URL
        run: yarn build
        env:
          VITE_CDN_BASE_URL: ${{ env.CDN_BASE_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_SENTRY_RELEASE: ${{ github.sha }}

        
      - name: Last opp assets til CDN
        uses: nais/deploy/actions/cdn-upload/v2@65d1b089882173f50fd51161b1a5b6ef3a18b9ea
        with:
          source: dist/k9/web/
          destination: k9-sak-web/
          team: k9saksbehandling
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}


      - name: Bygg server
        uses: ./.github/actions/build-server

      - name: Bygg og push Docker-image
        uses: navikt/sif-gha-workflows/.github/actions/maven/build-push-docker-image@main
        id: docker-push-cdn
        with:
          without_navikt_prefix: true
          push-image: true

      - name: Deploy CDN-variant til dev-fss
        uses: nais/deploy/actions/deploy@a7f8690f9b367fcbf5348a0a1e21d44f1aae50eb # v2
        env:
          CLUSTER: ${{ env.CLUSTER }}
          RESOURCE: deploy/dev-fss-k9saksbehandling.yml
          VARS: deploy/dev-cdn.yaml
          VAR: image=${{ steps.docker-push-cdn.outputs.image }}
