name: "Storybook Tests"
permissions:
  contents: write
  packages: read
on:
  workflow_call:
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-noble
    steps:
      - name: Hente kode
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup + Install
        uses: ./.github/actions/setup-install
        with:
          npmAuthToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Storybook
        run: yarn build-storybook-test --quiet

      - name: Sjekk om baseline-oppdatering er forespurt
        id: check-update
        run: |
          MSG=$(git log -1 --pretty=format:'%s')
          if echo "$MSG" | grep -q '\[update-baselines\]'; then
            echo "update=true" >> $GITHUB_OUTPUT
          else
            echo "update=false" >> $GITHUB_OUTPUT
          fi

      - name: Serve Storybook and run tests
        env:
          VISUAL_UPDATE: ${{ steps.check-update.outputs.update }}
        run: |
          npx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "npx http-server .static_storybook --port 9001 --silent" \
            "npx wait-on tcp:9001 && yarn test-storybook:ci"

      - name: Commit updated baselines
        if: steps.check-update.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add __visual_snapshots__/
          git diff --staged --quiet || git commit -m "chore: update visual regression baselines"
          git push

      - name: Upload visual diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: __visual_snapshots__/__diff_output__/
          retention-days: 30
