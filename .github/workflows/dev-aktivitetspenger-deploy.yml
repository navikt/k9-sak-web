name: Build and deploy dev-aktivitetspenger
on:
  push:
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'CODEOWNERS'
    branches:
      - aktivitetspenger

jobs:
  build-deploy:
    name: Build and deploy Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: read
    env:
      CLUSTER: dev-gcp
    steps:
      - name: Hente kode
        uses: actions/checkout@v6

      - name: Setup + Install
        uses: ./.github/actions/setup-install
        with:
          npmAuthToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Bygge dist
        run: yarn build:ung

      - name: Bygg server
        uses: ./.github/actions/build-server

      - name: Build and push to docker registry
        uses: navikt/sif-gha-workflows/.github/actions/maven/build-push-docker-image@main
        id: docker-push
        with:
          additional-tag: 'dev-aktivitetspenger'
          without_navikt_prefix: true
          build-args: |
            featureToggles=ung.feature-toggles.json
            proxyConfig=ung.proxy.nginx
            appVariant=ung
            port=9005
          push-image: true
      - name: Deploy to nais
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: ${{ env.CLUSTER }}
          RESOURCE: deploy/ung/dev-gcp.yml
          VARS: deploy/ung/dev-aktivitetspenger.yaml
          VAR: image=${{ steps.docker-push.outputs.image }}
