name: Valider pull request
permissions:
  contents: read
  packages: read
  pull-requests: write
on: [pull_request]
jobs:
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  storybook-test:
    uses: ./.github/workflows/storybook-tests.yml
    secrets: inherit

  lint-tscheck-build:
    uses: ./.github/workflows/lint-tscheck-build.yml
    secrets: inherit
    with:
      run-build: true

  knip:
    uses: ./.github/workflows/knip.yml
    secrets: inherit

  sif-code-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: navikt/sif-gha-workflows/.github/actions/sif-code-scan@97a944ba12c0db588a29cfeed8a7dcb22e087d3f # v1.0.1

