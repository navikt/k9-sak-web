name: Update Visual Baselines

permissions:
  contents: write
  packages: read

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to update baselines on"
        required: true
        default: "master"

jobs:
  update-baselines:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup + Install
        uses: ./.github/actions/setup-install
        with:
          npmAuthToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Storybook
        run: yarn build-storybook-test --quiet

      - name: Generate visual baselines
        run: |
          npx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "npx http-server .static_storybook --port 9001 --silent" \
            "npx wait-on tcp:9001 && yarn test-storybook:update-snapshots"

      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add __visual_snapshots__/
          git diff --staged --quiet || git commit -m "chore: update visual regression baselines"
          git push
