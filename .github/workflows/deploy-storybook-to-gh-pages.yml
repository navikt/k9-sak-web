name: Build and Publish Storybook to GitHub Pages
on:
  push:
    branches:
      - feature/errorhandling
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Hente kode
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: feature/errorhandling

      - name: Setup yarnrc
        uses: ./.github/actions/setup-yarnrc
        with:
          npmAuthToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Sette opp Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "yarn"

      - uses: bitovi/github-actions-storybook-to-github-pages@ddd9d35f670cceedd2bfc444be681001b0709730 # v1.0.4
        with:
          install_command: LEFTHOOK=0 yarn install --immutable
          build_command: yarn build-storybook
          path: .static_storybook
          checkout: false
