name: Build server
description: Install dependencies and compile TypeScript for the Express server.

runs:
  using: composite
  steps:
    - name: Sette opp node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'

    - name: Installere server-avhengigheter og bygge
      shell: bash
      working-directory: server
      run: yarn install && yarn build
