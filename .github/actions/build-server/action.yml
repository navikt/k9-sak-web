name: Build server
description: Compile TypeScript for the Express server.

runs:
  using: composite
  steps:
    - name: Sette opp node
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Bygge server
      shell: bash
      run: pnpm --filter @k9-sak-web/server build
