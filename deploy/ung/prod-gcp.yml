apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: {{ name }}
  namespace: k9saksbehandling
  labels:
    team: k9saksbehandling
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "32k"
spec:
  image: {{ image }}
  port: 9005
  liveness:
    path: /isAlive
    initialDelay: 10
  readiness:
    path: /isReady
    initialDelay: 10
  replicas:
    disableAutoScaling: true
    min: {{ replicas.min }}
    max: {{ replicas.max }}
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      memory: 256Mi
  ingresses:
    - '{{ ingress }}'
  accessPolicy:
    outbound:
      rules:
        - application: ung-sak
        - application: ung-tilbake
  env:
    - name: APP_URL
      value: "http://ung-sak"
    - name: PORT
      value: "9005"
    - name: APP_URL_UNG_TILBAKE
      value: "http://ung-tilbake"
