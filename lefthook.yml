pre-commit:
  parallel: false
  commands:
    eslint:
      glob: "packages/**/*.{ts,tsx,js,jsx}"
      exclude: '\.module\.d\.css\.(ts|tsx|js|jsx)$'
      run: pnpm eslint --cache --fix {staged_files}
      stage_fixed: true
    prettier-ts:
      glob: "packages/**/*.{ts,tsx,js,jsx}"
      exclude: '\.module\.d\.css\.(ts|tsx|js|jsx)$'
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
    stylelint:
      glob: "packages/**/*.css"
      run: pnpm stylelint --fix {staged_files}
      stage_fixed: true
    prettier-css:
      glob: "packages/**/*.css"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
